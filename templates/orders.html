{% extends 'base.html' %}

{% block content %}

<div class="orders-container">

    <h1>My Orders</h1>

    {% if orders %}

    <table class="orders-table">

        <tr>
            <th>Order ID</th>
            <th>Date</th>
            <th>Total Amount</th>
            <th>Status</th>
        </tr>

        {% for order in orders %}

        <tr>
            <td>#{{ order.id }}</td>
            <td>{{ order.created_at }}</td>
            <td>₹{{ order.total_amount }}</td>
            <td><span class="status">Completed</span></td>
        </tr>

        {% endfor %}

    </table>

    {% else %}

        <h2>No orders yet.</h2>

    {% endif %}

</div>

{% endblock %}
