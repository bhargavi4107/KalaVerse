{% extends 'base.html' %}

{% block content %}

<div class="auth-container">

    <h2>Create an Account</h2>

    <form method="POST">

        {% csrf_token %}

        {{ form.errors }}

        {{ form.as_p }}

        <button type="submit">Register</button>

    </form>

    <p>
        Already have an account?
        <a href="{% url 'login' %}">Login</a>
    </p>

</div>

{% endblock %}
